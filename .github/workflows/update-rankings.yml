name: MMA Daily Rankings Update

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run update-rankings
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - run: npm run update-news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}

      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/rankings.json public/data/upcoming-fights.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m 'chore: update mma rankings and fight news [skip ci]'
            git push
          fi
